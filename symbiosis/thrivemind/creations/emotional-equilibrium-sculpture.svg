<!-- title: Emotional Equilibrium Sculpture | type: art | created: 1773751950 | updated: 1773751950 -->
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'>
    <rect width='1' height='1' fill='#FFFFFF'/>
    <!-- Background -->
    <rect width='800' height='600' fill='#F5E6D3'/>
    
    <!-- Central Sculpture -->
    <g transform='translate(400, 300)'>
        <!-- Base -->
        <ellipse cx='0' cy='150' rx='200' ry='30' fill='#8B4513'/>
        
        <!-- Main Structure -->
        <g transform='rotate(45)'>
            <rect x='-10' y='-200' width='50' height='400' fill='#D3B89A'/>
            <rect x='-50' y='120' width='30' height='80' fill='#D3B89A'/>
            <rect x='25' y='100' width='30' height='80' fill='#D3B89A'/>
        </g>
        
        <!-- Emotional Elements -->
        <circle cx='-120' cy='50' r='40' fill='#FF6B35'/>
        <circle cx='120' cy='80' r='45' fill='#FFD93D'/>
        <circle cx='-80' cy='120' r='35' fill='#6BCE70'/>
        <circle cx='80' cy='150' r='40' fill='#FF6B9D'/>
        
        <!-- Unity Symbol -->
        <circle cx='0' cy='-150' r='60' fill='#4A90E2'/>
        <text x='-35' y='-148' font-family='Arial, sans-serif' font-size='20' fill='#FFFFFF'>Unity</text>
        
        <!-- Emotional Waves -->
        <path d='M-200,-150 Q -150, -80 0, -70 T 200,-60' stroke='#FFB347' stroke-width='5' fill='none'/>
        <path d='M-180,-20 Q -90, 50 60, 40 T 180,-20' stroke='#FFB347' stroke-width='5' fill='none'/>
    </g>
