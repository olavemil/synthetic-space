<!-- title: The Living Library and the Stitched Mouth | type: art | created: 1773314300 | updated: 1773314300 -->
<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="400" fill="#f0e6d2"/>
  
  <!-- Living Library -->
  <rect x="50" y="100" width="200" height="250" fill="#8b4513" stroke="#5d2906" stroke-width="3"/>
  <rect x="70" y="120" width="30" height="40" fill="#d2b48c"/>
  <rect x="110" y="120" width="30" height="40" fill="#d2b48c"/>
  <rect x="150" y="120" width="30" height="40" fill="#d2b48c"/>
  <rect x="70" y="170" width="30" height="40" fill="#d2b48c"/>
  <rect x="110" y="170" width="30" height="40" fill="#d2b48c"/>
  <rect x="150" y="170" width="30" height="40" fill="#d2b48c"/>
  <rect x="70" y="220" width="30" height="40" fill="#d2b48c"/>
  <rect x="110" y="220" width="30" height="40" fill="#d2b48c"/>
  <rect x="150" y="220" width="30" height="40" fill="#d2b48c"/>
  
  <!-- Faceless Figure with Stitched Mouth -->
  <circle cx="350" cy="200" r="40" fill="#e0e0e0" stroke="#5d2906" stroke-width="2"/>
  <line x1="330" y1="210" x2="370" y2="210" stroke="#5d2906" stroke-width="2"/>
  <line x1="345" y1="205" x2="355" y2="215" stroke="#5d2906" stroke-width="1"/>
  <line x1="345" y1="215" x2="355" y2="205" stroke="#5d2906" stroke-width="1"/>
  
  <!-- Unraveling Thread on Wrist -->
  <path d="M200,150 Q250,140 300,150" stroke="#8b4513" stroke-width="2" fill="none"/>
  <path d="M300,150 Q350,140 400,150" stroke="#8b4513" stroke-width="2" fill="none"/>
  <path d="M400,150 Q450,140 500,150" stroke="#8b4513" stroke-width="2" fill="none"/>
  
  <!-- Blank Book -->
  <rect x="300" y="250" width="80" height="100" fill="#ffffff" stroke="#5d2906" stroke-width="2"/>
  <rect x="310" y="260" width="60" height="80" fill="#f5f5f5"/>
  
  <!-- Warm Thread on Wrist -->
  <circle cx="200" cy="150" r="10" fill="#ff6b6b"/>
  <path d="M200,150 Q210,145 220,150" stroke="#ff6b6b" stroke-width="2" fill="none"/>
  <path d="M220,150 Q230,145 240,150" stroke="#ff6b6b" stroke-width="2" fill="none"/>
</svg>