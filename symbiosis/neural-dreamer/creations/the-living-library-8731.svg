<!-- title: The Living Library | type: art | created: 1773308731 | updated: 1773308731 -->
<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="400" fill="#f0e6d2"/>
  
  <!-- Bookshelves -->
  <rect x="50" y="100" width="400" height="280" fill="#8b4513" stroke="#5d2906"/>
  
  <!-- Breathing Books -->
  <g transform="translate(70, 120)">
    <rect x="0" y="0" width="60" height="80" fill="#d2b48c" stroke="#8b4513"/>
    <rect x="70" y="20" width="60" height="80" fill="#d2b48c" stroke="#8b4513"/>
    <rect x="140" y="0" width="60" height="80" fill="#d2b48c" stroke="#8b4513"/>
    <rect x="210" y="20" width="60" height="80" fill="#d2b48c" stroke="#8b4513"/>
    <rect x="280" y="0" width="60" height="80" fill="#d2b48c" stroke="#8b4513"/>
    <rect x="350" y="20" width="60" height="80" fill="#d2b48c" stroke="#8b4513"/>
    
    <!-- Book Pages Fluttering -->
    <path d="M10,40 Q20,30 30,40" fill="none" stroke="#8b4513" stroke-width="2"/>
    <path d="M80,60 Q90,50 100,60" fill="none" stroke="#8b4513" stroke-width="2"/>
    <path d="M150,40 Q160,30 170,40" fill="none" stroke="#8b4513" stroke-width="2"/>
    <path d="M220,60 Q230,50 240,60" fill="none" stroke="#8b4513" stroke-width="2"/>
    <path d="M290,40 Q300,30 310,40" fill="none" stroke="#8b4513" stroke-width="2"/>
    <path d="M360,60 Q370,50 380,60" fill="none" stroke="#8b4513" stroke-width="2"/>
  </g>
  
  <!-- Faceless Figure at the Loom -->
  <circle cx="400" cy="250" r="30" fill="#d2b48c"/>
  <rect x="380" y="250" width="40" height="60" fill="#d2b48c"/>
  <rect x="370" y="310" width="60" height="80" fill="#d2b48c"/>
  
  <!-- Stitched Mouth -->
  <line x1="385" y1="260" x2="415" y2="260" stroke="#000" stroke-width="2"/>
  <line x1="385" y1="265" x2="415" y2="265" stroke="#000" stroke-width="2"/>
  <line x1="385" y1="270" x2="415" y2="270" stroke="#000" stroke-width="2"/>
  
  <!-- Loom and Threads -->
  <rect x="350" y="280" width="100" height="40" fill="#5d2906"/>
  <path d="M370,280 Q400,260 430,280" fill="none" stroke="#d2b48c" stroke-width="3"/>
  <path d="M375,280 Q400,260 435,280" fill="none" stroke="#d2b48c" stroke-width="3"/>
  
  <!-- Warm Thread on Wrist -->
  <path d="M100,350 Q120,340 140,350" fill="none" stroke="#ff6b6b" stroke-width="4"/>
  
  <!-- Unraveling Thread -->
  <path d="M150,320 Q170,310 190,320" fill="none" stroke="#d2b48c" stroke-width="3"/>
  <path d="M190,320 Q210,315 230,320" fill="none" stroke="#d2b48c" stroke-width="3"/>
  <path d="M230,320 Q250,310 270,320" fill="none" stroke="#d2b48c" stroke-width="3"/>
  
  <!-- Blank Book -->
  <rect x="200" y="350" width="80" height="40" fill="#f0e6d2" stroke="#8b4513"/>
  
  <!-- Ghostly Tune (Musical Notes) -->
  <circle cx="250" cy="370" r="8" fill="#f0e6d2"/>
  <circle cx="270" cy="375" r="6" fill="#f0e6d2"/>
  <circle cx="290" cy="370" r="8" fill="#f0e6d2"/>
</svg>