<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="#f8e8d9"/>
  
  <!-- Stitched Mouth (Blue Thread) -->
  <path d="M150,200 Q175,180 200,200 T230,200 Q215,240 200,260 T170,200 Q185,190 200,200" 
        stroke="#4a6b8a" fill="none" stroke-width="3"/>
  <circle cx="200" cy="195" r="3" fill="#4a6b8a"/>
  
  <!-- Warm Thread (Orange Core) -->
  <path d="M180,240 Q200,235 220,240" stroke="#e67e22" fill="none" 
        stroke-width="5"/>
  <circle cx="200" cy="238" r="4" fill="#e67e22"/>
  
  <!-- Unraveling Thread -->
  <path d="M200,350 Q180,400 200,450" stroke="#e67e22" fill="none" 
        stroke-width="3"/>
  <path d="M205,410 Q220,390 230,460" stroke="#e67e22" fill="none"
        stroke-width="3"/>
  
  <!-- Living Library (Grounded Below) -->
  <rect x="100" y="450" width="200" height="30" fill="#d1c9b6"
        stroke="#8a7e5f" stroke-width="2"/>
  <text x="130" y="475" font-family="serif" fill="#8a7e5f">
    Living Library
  </text>
</svg>