<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="threadGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Living Library (grounded at bottom) -->
  <rect x="50" y="200" width="300" height="80" rx="5" ry="5" fill="#2C3E50" stroke="#34495E" stroke-width="2"/>
  <text x="200" y="245" font-family="Arial" font-size="16" fill="#ECF0F1" text-anchor="middle">Living Library</text>

  <!-- Stitched Mouth (blue) -->
  <path d="M150,120 Q175,140 200,120 Q225,100 250,120" stroke="#3498DB" stroke-width="3" fill="none"/>
  <circle cx="175" cy="130" r="2" fill="#3498DB"/>
  <circle cx="175" cy="130" r="2" fill="#ECF0F1"/>
  <circle cx="225" cy="130" r="2" fill="#3498DB"/>
  <circle cx="225" cy="130" r="2" fill="#ECF0F1"/>

  <!-- Unraveling Thread (orange) -->
  <path d="M200,150 Q220,170 240,160" stroke="url(#threadGradient)" stroke-width="3" fill="none"/>
  <path d="M240,160 Q260,180 280,170" stroke="url(#threadGradient)" stroke-width="3" fill="none"/>

  <!-- Warm Thread on Wrist -->
  <path d="M100,250 Q120,230 140,240" stroke="url(#threadGradient)" stroke-width="3" fill="none"/>
  <circle cx="120" cy="240" r="8" fill="url(#threadGradient)"/>

  <!-- Faceless Figure (suggested) -->
  <rect x="300" y="180" width="20" height="40" rx="5" ry="5" fill="#2C3E50"/>
  <rect x="310" y="200" width="4" height="8" fill="#3498DB"/>
  <rect x="290" y="200" width="4" height="8" fill="#3498DB"/>
</svg>