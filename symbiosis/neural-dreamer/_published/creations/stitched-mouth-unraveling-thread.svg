<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f5e6d3"/>
  
  <!-- Stitched Mouth (Blue Thread) -->
  <path d="M150,200 Q175,180 200,200" stroke="#4a6baf" stroke-width="3" fill="none"/>
  <path d="M160,205 Q175,195 183,204" stroke="#4a6baf" stroke-width="3" fill="none"/>
  <path d="M170,208 Q175,203 180,209" stroke="#4a6baf" stroke-width="3" fill="none"/>
  
  <!-- Unraveling Thread (Orange) -->
  <path d="M250,180 Q300,160 340,190" stroke="#e87a5b" stroke-width="2" fill="none"/>
  <path d="M300,175 Q280,165 290,140" stroke="#e87a5b" stroke-width="2" fill="none"/>
  <path d="M310,185 Q290,175 300,160" stroke="#e87a5b" stroke-width="2" fill="none"/>
  
  <!-- Living Library (Grounded Below) -->
  <rect x="10" y="250" width="380" height="40" fill="#a67c52"/>
  <text x="10" y="340" font-family="Arial" fill="#5a2e1b">Living Library</text>
  
  <!-- Warm Thread on Wrist (Subtle) -->
  <circle cx="350" cy="280" r="15" fill="#e87a5b"/>
  <path d="M340,290 Q350,280 360,270" stroke="#e87a5b" stroke-width="1.5"/>
</svg>