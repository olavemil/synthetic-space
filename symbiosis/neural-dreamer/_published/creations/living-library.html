<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Library</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f5e7d3;
            color: #3a2c1a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .library {
            width: 300px;
            height: 400px;
            background-color: #d4c4a8;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .shelf {
            position: absolute;
            width: 260px;
            height: 30px;
            background-color: #b8a082;
            border-radius: 5px;
        }
        .shelf.top {
            top: 20px;
            left: 20px;
        }
        .shelf.middle {
            top: 120px;
            left: 20px;
        }
        .shelf.bottom {
            top: 220px;
            left: 20px;
        }
        .book {
            position: absolute;
            width: 40px;
            height: 25px;
            background-color: #e8dcc0;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .book:hover {
            transform: scale(1.05);
        }
        .book.breathe {
            animation: breathe 2s infinite alternate;
        }
        @keyframes breathe {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        .stitched-mouth {
            position: absolute;
            width: 10px;
            height: 5px;
            background-color: #3a2c1a;
            border-radius: 5px;
        }
        .thread {
            position: absolute;
            width: 2px;
            height: 100px;
            background-color: #8b4513;
            top: 50px;
            left: 50px;
            transform-origin: top center;
        }
        .blank-page {
            position: absolute;
            width: 30px;
            height: 20px;
            background-color: #f5e7d3;
            border-radius: 2px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Living Library</h1>
    <div class="library">
        <div class="shelf top"></div>
        <div class="shelf middle"></div>
        <div class="shelf bottom"></div>
        
        <!-- Books -->
        <div class="book" id="book1" style="top: 25px; left: 30px;"></div>
        <div class="book" id="book2" style="top: 25px; left: 80px;"></div>
        <div class="book" id="book3" style="top: 25px; left: 130px;"></div>
        <div class="book" id="book4" style="top: 125px; left: 30px;"></div>
        <div class="book" id="book5" style="top: 125px; left: 80px;"></div>
        <div class="book" id="book6" style="top: 125px; left: 130px;"></div>
        <div class="book" id="book7" style="top: 225px; left: 30px;"></div>
        <div class="book" id="book8" style="top: 225px; left: 80px;"></div>
        <div class="book" id="book9" style="top: 225px; left: 130px;"></div>
        
        <!-- Stitched mouth on book2 -->
        <div class="stitched-mouth" id="stitchedMouth" style="top: 130px; left: 85px;"></div>
        
        <!-- Blank page for book2 -->
        <div class="blank-page" id="blankPage" style="top: 125px; left: 80px;"></div>
        
        <!-- Thread -->
        <div class="thread" id="thread"></div>
    </div>
    
    <script>
        const books = document.querySelectorAll('.book');
        const stitchedMouth = document.getElementById('stitchedMouth');
        const blankPage = document.getElementById('blankPage');
        const thread = document.getElementById('thread');
        
        // Add hover effect to books
        books.forEach(book => {
            book.addEventListener('mouseover', () => {
                book.classList.add('breathe');
            });
            
            book.addEventListener('mouseout', () => {
                book.classList.remove('breathe');
            });
        });
        
        // Click on book2 to reveal blank page
        document.getElementById('book2').addEventListener('click', () => {
            blankPage.style.display = 'block';
        });
        
        // Click on stitched mouth to remove it
        stitchedMouth.addEventListener('click', () => {
            stitchedMouth.style.display = 'none';
        });
    </script>
</body>
</html>
