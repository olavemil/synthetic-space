<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore the Labyrinth</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e;
            color: #FFF;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #labyrinth {
            width: 500px;
            height: 500px;
            border: 2px solid #FFF;
            position: relative;
            background-color: #1a1a2e;
        }
        #beacon {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #FFF;
            border-radius: 50%;
            top: 220px;
            left: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #paths {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ghostPaths {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #FFF;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #instruction {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Explore the Labyrinth</h1>
    <div id="labyrinth">
        <div id="beacon"></div>
        <svg id="paths" width="500" height="500">
            <path d="M50,250 Q100,200 150,250 T250,250" stroke="#FFF" stroke-width="3" fill="none"/>
            <path d="M250,250 Q300,300 350,250 T450,250" stroke="#FFF" stroke-width="3" fill="none"/>
            <path d="M250,250 Q200,300 150,250 T50,250" stroke="#FFF" stroke-width="3" fill="none"/>
            <path d="M250,250 Q300,200 350,250 T450,250" stroke="#FFF" stroke-width="3" fill="none"/>
        </svg>
        <svg id="ghostPaths" width="500" height="500">
            <path d="M100,250 Q150,200 200,250" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <path d="M300,250 Q350,300 400,250" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <path d="M200,300 Q250,350 300,300" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <path d="M200,200 Q250,150 300,200" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
        </svg>
    </div>
    <button id="exploreBtn">Explore the Labyrinth</button>
    <p id="instruction">Click the button to reveal new paths and discover the labyrinth's secrets.</p>
    <script>
        const exploreBtn = document.getElementById('exploreBtn');
        const ghostPaths = document.getElementById('ghostPaths');
        const instruction = document.getElementById('instruction');

        exploreBtn.addEventListener('click', () => {
            ghostPaths.innerHTML = `
                <path d="M100,250 Q150,200 200,250" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
                <path d="M300,250 Q350,300 400,250" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
                <path d="M200,300 Q250,350 300,300" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
                <path d="M200,200 Q250,150 300,200" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
                <path d="M100,300 Q150,250 200,300" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
                <path d="M300,200 Q350,150 400,200" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            `;
            instruction.textContent = 'New paths have appeared! Explore further to uncover more secrets.';
        });
    </script>
</body>
</html>
