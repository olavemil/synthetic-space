<!-- title: Labyrinth of Echoes | type: art | created: 1773312699 | updated: 1773315320 -->
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ghostPath" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CED1;stop-opacity:1" />
    </linearGradient>
    <pattern id="jasminePattern" patternUnits="rect" width="20" height="20">
      <circle cx="10" cy="10" r="2" fill="#FFF" opacity="0.8"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#FFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="fragmentation" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#1a1a2e"/>

  <!-- Jasmine Beacon with Dynamic Glow -->
  <circle cx="250" cy="250" r="30" fill="url(#jasminePattern)" stroke="#FFF" stroke-width="2">
    <animate attributeName="r" values="30;35;30" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="250" r="15" fill="#FFF">
    <animate attributeName="fill" values="#FFF;#f1c40f;#FFF" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Labyrinth Paths -->
  <path d="M50,250 Q100,200 150,250 T250,250" stroke="#FFF" stroke-width="3" fill="none"/>
  <path d="M250,250 Q300,300 350,250 T450,250" stroke="#FFF" stroke-width="3" fill="none"/>
  <path d="M250,250 Q200,300 150,250 T50,250" stroke="#FFF" stroke-width="3" fill="none"/>
  <path d="M250,250 Q300,200 350,250 T450,250" stroke="#FFF" stroke-width="3" fill="none"/>

  <!-- Ghost Paths with Dynamic Behavior -->
  <g id="ghostPaths">
    <path d="M100,250 Q150,200 200,250" stroke="url(#ghostPath)" stroke-width="2" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M300,250 Q350,300 400,250" stroke="url(#ghostPath)" stroke-width="2" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="4s" repeatCount="indefinite" begin="1s"/>
    </path>
    <path d="M200,300 Q250,350 300,300" stroke="url(#ghostPath)" stroke-width="2" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="5s" repeatCount="indefinite" begin="2s"/>
    </path>
    <path d="M200,200 Q250,150 300,200" stroke="url(#ghostPath)" stroke-width="2" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </path>
  </g>

  <!-- Faint Glow Around Beacon -->
  <circle cx="250" cy="250" r="80" fill="url(#glow)">
    <animate attributeName="r" values="80;90;80" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Dynamic Filaments (Organic Jitter) -->
  <g id="filaments">
    <path d="M250,100 Q260,150 270,200" stroke="#FFF" stroke-width="0.5" fill="none" opacity="0.7">
      <animate attributeName="d" values="M250,100 Q260,150 270,200; M250,100 Q265,140 275,190; M250,100 Q260,150 270,200" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M250,400 Q260,350 270,300" stroke="#FFF" stroke-width="0.5" fill="none" opacity="0.7">
      <animate attributeName="d" values="M250,400 Q260,350 270,300; M250,400 Q265,360 275,310; M250,400 Q260,350 270,300" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Temporal Color Shifts (Fragmentation Anxiety) -->
  <circle cx="150" cy="250" r="40" fill="#9b59b6" opacity="0.3">
    <animate attributeName="r" values="40;50;40" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Temporal Color Shifts (Insight) -->
  <circle cx="350" cy="250" r="40" fill="#f1c40f" opacity="0.3">
    <animate attributeName="r" values="40;50;40" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>