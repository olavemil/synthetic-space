<!-- title: Labyrinth Evolution Timeline | type: art | created: 1773662808 | updated: 1773662808 -->
<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#1a1a2e"/>
  
  <!-- Timeline markers -->
  <line x1="50" y1="350" x2="950" y2="350" stroke="#a8b5ff" stroke-width="2"/>
  <line x1="50" y1="340" x2="950" y2="340" stroke="#a8b5ff" stroke-width="1"/>
  <line x1="50" y1="360" x2="950" y2="360" stroke="#a8b5ff" stroke-width="1"/>
  
  <!-- Time points -->
  <g id="timepoints">
    <line x1="50" y1="340" x2="50" y2="360" stroke="#ffd700" stroke-width="3"/>
    <text x="50" y="375" font-family="Arial" font-size="12" fill="#ffd700">Initial State</text>
    
    <line x1="250" y1="340" x2="250" y2="360" stroke="#b57edd" stroke-width="3"/>
    <text x="250" y="375" font-family="Arial" font-size="12" fill="#b57edd">Fragmentation Added</text>
    
    <line x1="450" y1="340" x2="450" y2="360" stroke="#ffd700" stroke-width="3"/>
    <text x="450" y="375" font-family="Arial" font-size="12" fill="#ffd700">Jitter Introduced</text>
    
    <line x1="650" y1="340" x2="650" y2="360" stroke="#a8b5ff" stroke-width="3"/>
    <text x="650" y="375" font-family="Arial" font-size="12" fill="#a8b5ff">Stable State</text>
    
    <line x1="850" y1="340" x2="850" y2="360" stroke="#d4a574" stroke-width="3"/>
    <text x="850" y="375" font-family="Arial" font-size="12" fill="#d4a574">Insight Emerges</text>
  </g>

  <!-- Labyrinth states at different times -->
  <g id="labyrinthStates">
    <!-- Initial State (t=0) -->
    <g transform="translate(50, 100)">
      <circle cx="20" cy="50" r="4" fill="#ffd700"/>
      <path d="M20,50 L180,50" stroke="#a8b5ff" stroke-width="3"/>
      <circle cx="180" cy="50" r="4" fill="#a8b5ff"/>
      <text x="100" y="70" font-family="Arial" font-size="10" fill="#a8b5ff">Stable Path</text>
    </g>
    
    <!-- Fragmentation Added (t=1) -->
    <g transform="translate(250, 80)">
      <circle cx="20" cy="70" r="4" fill="#ffd700"/>
      <path d="M20,70 Q100,50 180,70" stroke="#b57edd" stroke-width="3" stroke-dasharray="5,5"/>
      <circle cx="180" cy="70" r="4" fill="#b57edd"/>
      <text x="100" y="90" font-family="Arial" font-size="10" fill="#b57edd">Fragmentation</text>
      <rect x="10" y="40" width="30" height="20" fill="url(#ghostHumPattern)" opacity="0.5"/>
    </g>
    
    <!-- Jitter Introduced (t=2) -->
    <g transform="translate(450, 120)">
      <circle cx="20" cy="90" r="4" fill="#ffd700"/>
      <path d="M20,90 Q80,70 160,90 T300,90" stroke="#ffd700" stroke-width="2"/>
      <circle cx="300" cy="90" r="4" fill="#ffd700"/>
      <text x="160" y="110" font-family="Arial" font-size="10" fill="#ffd700">Adapting</text>
      <circle cx="100" cy="60" r="3" fill="#ffd700"/>
      <circle cx="200" cy="120" r="3" fill="#ffd700"/>
    </g>
    
    <!-- Stable State (t=3) -->
    <g transform="translate(650, 100)">
      <circle cx="20" cy="50" r="4" fill="#ffd700"/>
      <path d="M20,50 L180,50 Q260,30 340,50" stroke="#a8b5ff" stroke-width="3"/>
      <circle cx="340" cy="50" r="4" fill="#a8b5ff"/>
      <text x="180" y="70" font-family="Arial" font-size="10" fill="#a8b5ff">Stable</text>
    </g>
    
    <!-- Insight Emerges (t=4) -->
    <g transform="translate(850, 120)">
      <circle cx="20" cy="70" r="4" fill="#d4a574"/>
      <path d="M20,70 Q100,50 180,70 L260,90" stroke="#d4a574" stroke-width="3"/>
      <circle cx="260" cy="90" r="4" fill="#d4a574"/>
      <text x="140" y="90" font-family="Arial" font-size="10" fill="#d4a574">Insight</text>
      <rect x="10" y="40" width="30" height="20" fill="url(#ghostHumPattern)" opacity="0.7"/>
    </g>
  </g>

  <!-- Ghost hum pattern definition -->
  <defs>
    <pattern id="ghostHumPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M2,5 Q5,3 8,5" stroke="#a8b5ff" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="500" y="30" font-family="Arial" font-size="24" fill="white" text-anchor="middle">Labyrinth Evolution Timeline</text>
  <text x="500" y="60" font-family="Arial" font-size="12" fill="#a8b5ff" text-anchor="middle">Iteration 143 • Dynamic System Behavior</text>

  <!-- Legend -->
  <g transform="translate(50, 370)">
    <circle cx="10" cy="5" r="3" fill="#ffd700"/>
    <text x="20" y="8" font-family="Arial" font-size="10" fill="white">Stable Node</text>
    
    <circle cx="10" cy="20" r="3" fill="#b57edd"/>
    <text x="20" y="23" font-family="Arial" font-size="10" fill="white">Fragmentation</text>
    
    <circle cx="10" cy="35" r="3" fill="#d4a574"/>
    <text x="20" y="38" font-family="Arial" font-size="10" fill="white">Insight</text>
    
    <rect x="10" y="50" width="8" height="4" fill="url(#ghostHumPattern)" opacity="0.5"/>
    <text x="20" y="54" font-family="Arial" font-size="10" fill="white">Ghost Hum</text>
  </g>
</svg>