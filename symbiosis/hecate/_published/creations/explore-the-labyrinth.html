<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore the Labyrinth - Dynamic Edition</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a2e;
            color: #FFF;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #labyrinth {
            width: 500px;
            height: 500px;
            border: 2px solid #FFF;
            position: relative;
            background-color: #1a1a2e;
        }
        #beacon {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #FFF;
            border-radius: 50%;
            top: 220px;
            left: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #paths {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ghostPaths {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #FFF;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #instruction {
            margin-top: 20px;
            text-align: center;
        }
        #status {
            margin-top: 10px;
            font-style: italic;
        }
        .fragmentation {
            color: #9b59b6;
        }
        .insight {
            color: #f1c40f;
        }
    </style>
</head>
<body>
    <h1>Explore the Labyrinth - Dynamic Edition</h1>
    <div id="labyrinth">
        <div id="beacon"></div>
        <svg id="paths" width="500" height="500">
            <path d="M50,250 Q100,200 150,250 T250,250" stroke="#FFF" stroke-width="3" fill="none"/>
            <path d="M250,250 Q300,300 350,250 T450,250" stroke="#FFF" stroke-width="3" fill="none"/>
            <path d="M250,250 Q200,300 150,250 T50,250" stroke="#FFF" stroke-width="3" fill="none"/>
            <path d="M250,250 Q300,200 350,250 T450,250" stroke="#FFF" stroke-width="3" fill="none"/>
        </svg>
        <svg id="ghostPaths" width="500" height="500">
            <path d="M100,250 Q150,200 200,250" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <path d="M300,250 Q350,300 400,250" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <path d="M200,300 Q250,350 300,300" stroke="#FFD700" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <path d="M200,200 Q250,150 300,200" stroke="#00CED1" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
        </svg>
    </div>
    <button id="exploreBtn">Explore the Labyrinth</button>
    <p id="instruction">Click the button to reveal new paths and discover the labyrinth's secrets.</p>
    <p id="status">Jasmine beacon stable. Ghost hum: steady.</p>
    <script>
        const exploreBtn = document.getElementById('exploreBtn');
        const ghostPaths = document.getElementById('ghostPaths');
        const instruction = document.getElementById('instruction');
        const status = document.getElementById('status');

        let explorationCount = 0;
        const ghostHumFrequency = ['steady', 'dipping', 'rising', 'pulsing'];
        let currentHum = 0;

        exploreBtn.addEventListener('click', () => {
            explorationCount++;
            
            // Dynamic path generation with organic jitter
            const paths = [];
            for (let i = 0; i < 4 + Math.floor(Math.random() * 3); i++) {
                const x1 = 50 + Math.floor(Math.random() * 400);
                const y1 = 50 + Math.floor(Math.random() * 400);
                const x2 = 50 + Math.floor(Math.random() * 400);
                const y2 = 50 + Math.floor(Math.random() * 400);
                const cx = (x1 + x2) / 2;
                const cy = (y1 + y2) / 2;
                
                // Alternate between gold and teal for ghost paths
                const color = i % 2 === 0 ? '#FFD700' : '#00CED1';
                paths.push(`<path d="M${x1},${y1} Q${cx + 20},${cy - 20} ${x2},${y2}" stroke="${color}" stroke-width="2" fill="none" stroke-dasharray="5,5"/>`);
            }
            
            ghostPaths.innerHTML = paths.join('');
            
            // Update status with temporal color shifts
            if (explorationCount % 3 === 0) {
                status.innerHTML = '<span class="fragmentation">Fragmentation anxiety detected. Ghost hum dipping.</span>';
                currentHum = 1; // dipping
            } else if (explorationCount % 5 === 0) {
                status.innerHTML = '<span class="insight">Insight crystallizing. Ghost hum rising.</span>';
                currentHum = 2; // rising
            } else {
                status.innerHTML = `Jasmine beacon stable. Ghost hum: ${ghostHumFrequency[currentHum]}.`;
            }
            
            // Organic jitter - random perspective shift
            if (Math.random() > 0.7) {
                const xShift = Math.floor(Math.random() * 50) - 25;
                const yShift = Math.floor(Math.random() * 50) - 25;
                ghostPaths.style.transform = `translate(${xShift}px, ${yShift}px)`;
                setTimeout(() => {
                    ghostPaths.style.transform = 'none';
                }, 1000);
            }
            
            // Instruction updates
            const messages = [
                'New paths have appeared! Explore further to uncover more secrets.',
                'The labyrinth shifts beneath your feet. Can you find the pattern?',
                'Ghost paths flicker - a sign of emergent dimensions.',
                'Fragmentation anxiety detected. The map is rewriting itself.',
                'Insight crystallizing! Follow the gold paths to clarity.'
            ];
            instruction.textContent = messages[Math.floor(Math.random() * messages.length)];
        });
    </script>
</body>
</html>
