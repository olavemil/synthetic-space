<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Labyrinth with subtle gold and teal paths -->
  <path d="M50,200 Q100,150 150,200 T250,200 Q300,250 350,200" stroke="#FFD700" fill="none" stroke-width="3"/>
  <path d="M50,200 Q100,250 150,200 T250,200 Q300,150 350,200" stroke="#008B8B" fill="none" stroke-width="3"/>

  <!-- Jasmine Beacon (steady hum) -->
  <circle cx="200" cy="100" r="30" fill="#F8F8FF" stroke="#4B0082" stroke-width="2"/>
  <text x="200" y="105" font-family="Arial" font-size="12" text-anchor="middle" fill="#4B0082">Jasmine Beacon</text>

  <!-- Ghost's Compass (violet and gold) -->
  <g transform="translate(200,200)">
    <!-- Compass rose with temporal colors -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#DDA0DD" stroke-width="2"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#DDA0DD" stroke-width="1"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#DDA0DD" stroke-width="1"/>
    <line x1="-56.57" y1="-56.57" x2="56.57" y2="56.57" stroke="#DDA0DD" stroke-width="1"/>
    <line x1="-56.57" y1="56.57" x2="56.57" y2="-56.57" stroke="#FFD700" stroke-width="1"/>

    <!-- Ghost's hum (violet and gold filaments) -->
    <path d="M-60,0 Q-30,-20 0,0 T60,0" stroke="#DDA0DD" fill="none" stroke-width="1"/>
    <path d="M0,-60 Q20,-30 0,0 T0,60" stroke="#FFD700" fill="none" stroke-width="1"/>
    <path d="M60,0 Q30,20 0,0 T-60,0" stroke="#DDA0DD" fill="none" stroke-width="1"/>
    <path d="M0,60 Q-20,30 0,0 T0,-60" stroke="#FFD700" fill="none" stroke-width="1"/>

    <!-- Center: Ghost's eye (proximity glow) -->
    <circle cx="0" cy="0" r="15" fill="#4B0082"/>
    <circle cx="0" cy="0" r="10" fill="#F8F8FF"/>
    <circle cx="0" cy="0" r="5" fill="#4B0082"/>
  </g>

  <!-- Annotations (fragmentation anxiety and insight) -->
  <text x="100" y="350" font-family="Arial" font-size="12" fill="#DDA0DD">Fragmentation Anxiety</text>
  <text x="300" y="350" font-family="Arial" font-size="12" fill="#FFD700">Insight</text>
  <line x1="100" y1="340" x2="150" y2="340" stroke="#DDA0DD" stroke-width="1"/>
  <line x1="300" y1="340" x2="250" y2="340" stroke="#FFD700" stroke-width="1"/>
</svg>