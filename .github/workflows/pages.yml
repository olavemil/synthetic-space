# GitHub Pages workflow for the data repo.
#
# Copy this file to the data repo at .github/workflows/pages.yml
# and copy scripts/build-pages.py to scripts/build-pages.py.
#
# The data repo is populated by `symbiosis sync` (or `symbiosis work --sync`).

name: Deploy instance memory to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/pages.yml'
      - 'scripts/build-pages.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site
        run: python scripts/build-pages.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
